name: oidc-debug

# TEMPORARY diagnostic — prints the decoded claims of the GitHub OIDC token so
# we can see the exact `sub`/`aud` the AWS trust policy must match. Does not use
# AWS. Delete once the trust policy is confirmed.

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  claims:
    runs-on: ubuntu-latest
    steps:
      - name: Print OIDC token claims (sub / aud / repo / ref)
        run: |
          TOKEN=$(curl -sf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          # decode the JWT payload only (claims are not secret); pad base64url
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+')
          case $((${#PAYLOAD} % 4)) in 2) PAYLOAD="$PAYLOAD==";; 3) PAYLOAD="$PAYLOAD=";; esac
          echo "$PAYLOAD" | base64 -d 2>/dev/null | jq '{sub, aud, repository, repository_owner, ref, event_name, workflow_ref}'
