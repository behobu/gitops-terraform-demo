name: terraform-apply

# Applies on merge to main (or manual dispatch). State lives in S3, so this job
# writes nothing back to the repo — no branch-push bypass is needed.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      state_rm:
        description: >-
          Drift-recovery escape hatch. If set to a resource address (e.g.
          monad_pipeline.cloudtrail), the apply job runs `terraform state rm`
          on it BEFORE apply. Use when a resource was deleted outside
          Terraform and the provider's Read 500s on the stale state entry,
          wedging plan/apply. Leave empty for a normal apply.
        required: false
        default: ""

permissions:
  contents: read
  id-token: write   # OIDC federation to AWS for the S3 backend

concurrency:
  group: tf-apply-main   # never run two applies at once
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_monad_api_token: ${{ secrets.MONAD_API_TOKEN }}
  TF_VAR_monad_organization_id: ${{ secrets.MONAD_ORG_ID }}
  TF_VAR_ct_bucket: ${{ secrets.MONAD_CT_BUCKET }}
  TF_VAR_ct_role_arn: ${{ secrets.MONAD_CT_ROLE_ARN }}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (S3 backend)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=gitops-terraform-demo/terraform.tfstate" \
            -backend-config="region=us-west-1"

      - name: Terraform state rm (drift recovery)
        if: github.event_name == 'workflow_dispatch' && inputs.state_rm != ''
        run: |
          echo "Removing stale state entry: ${{ inputs.state_rm }}"
          terraform state rm '${{ inputs.state_rm }}'

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false -lock-timeout=120s
